<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 88" width="720" height="88">
  <style>text { font-family: "Courier New", Courier, monospace; font-weight: bold; }</style>
  <rect width="720" height="88" fill="#191928" stroke="#ffd23c" stroke-width="4"/>
